name: E2E Check

on:
  pull_request:
    branches:
      - 'main'
      - 'dev'
    types:
      - opened
      - synchronize
      - reopened

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  e2e_check:
    name: 'E2E Check'
    runs-on: ubuntu-latest
    # Run inside the same pinned Playwright image used locally. It ships the
    # browsers + system deps that match @playwright/test@1.61.0, so there is no
    # browser install/mismatch step. (CI does not use docker-compose; this is
    # independent of the local playwright-mcp / e2e services.)
    container:
      image: mcr.microsoft.com/playwright:v1.61.0-noble
    steps:
      - uses: actions/checkout@v4
      - name: Step 0 - 📁 Get pnpm store path
        id: pnpm-store
        run: |
          STORE_PATH=$(corepack pnpm store path --silent)
          echo "STORE_PATH=${STORE_PATH}" >> "$GITHUB_OUTPUT"
      - name: Step 0a - 📁 Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - name: Step 1 - ⚙️ Install Dependencies
        run: corepack pnpm install --frozen-lockfile
      - name: Step 2 - 🎭 Run E2E tests
        # The Playwright config builds the site and runs `astro preview` itself,
        # so no separate server step is needed. CI=true is set by GitHub Actions.
        run: corepack pnpm run test:e2e
      - name: Step 3 - 📤 Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
