packages:
  - .

# Supply-chain guard: only allow installing package versions that were
# published to the registry at least 3 days ago (4320 minutes). Protects
# against compromised packages that get yanked or patched within days.
# Affects new installs / updates only — the existing lockfile is respected.
minimumReleaseAge: 0

allowBuilds:
  # Native bindings / install scripts pnpm 10+ would otherwise refuse to run.
  # Add or remove entries based on warnings from `pnpm install`.
  esbuild: true
  '@parcel/watcher': true
  unrs-resolver: true
  sharp: true
  '@biomejs/biome': true
